# Cấu hình inference
system_prompt: >
  Answer the following question based solely on the image content
  concisely with a single term.

generation:
  max_new_tokens: 100
  thinking_budget: 0
  enable_thinking: false

anls:
  tau: 0.5                       # Ngưỡng để tính điểm ANLS

dataloader:
  batch_size: 1
  num_workers: 2
  shuffle: false
